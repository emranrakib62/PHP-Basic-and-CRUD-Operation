<html>
<body>

<script type="text/javascript">
function formvali() {
    var password = document.forms["sform"]["password"].value;
    

   var passreg = new RegExp("^(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.{8,})");
    
    if (!passreg.test(password)) {
        window.alert("Password must be at least eight characters including one small, one capital, and one digit.");
        return false;
    }

}
</script>

<form id="sform" name="sform" onsubmit="return formvali()">
    Password: <input type="text" name="password" id="password"><br><br>
    <input type="submit" value="Check Password">
</form>

</body>
</html>
